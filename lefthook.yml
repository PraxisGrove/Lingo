pre-commit:
  commands:
    01-format:
      run: pnpm format
      stage_fixed: true
      interactive: true
    02-lint:
      run: pnpm lint
      interactive: true
    03-test:
      run: pnpm test
      interactive: true
    04-browser-test:
      run: pnpm test:browser
      interactive: true
    05-typecheck:
      run: pnpm compile
      interactive: true
    06-check:
      run: pnpm check
      interactive: true
    07-build-chrome:
      run: pnpm build
      interactive: true
    08-build-firefox:
      run: pnpm build:firefox
      interactive: true
    09-whitespace:
      run: git diff --check

commit-msg:
  commands:
    conventional-commit:
      run: pnpm commitlint --edit {1}
      interactive: true
